name: Debug on Emulator

on:
  workflow_dispatch:
  # Trigger surface (VAL-CI-018 / Round-2 review Finding 2):
  #
  # The emulator hardening suite validates the full native-biometric-
  # first flow, including FLAG_SECURE, native Keychain / Keystore
  # behaviour, and the emulator driver itself. We trigger on:
  #
  #   - `pull_request` against any base branch — this is the critical
  #     trigger: a PR head must be validated BEFORE merge, not only
  #     after the merge commit lands on `main`. Without this, native
  #     vault / FLAG_SECURE / emulator-driver changes can sit on a
  #     PR for review with no emulator run, and only get exercised
  #     post-merge — the inverse of what a release-blocking suite
  #     should do.
  #   - `push` to long-lived branches (`main`, `master`, `mission/**`)
  #     — covers direct pushes (e.g. release tagging, mission-line
  #     fast-forwards) and ensures that the head of any active mission
  #     branch is always backed by a green emulator run, not just the
  #     PR snapshots.
  #
  # Both triggers share the same `paths:` filter so unrelated doc /
  # rule / lockfile churn does not consume an emulator slot.
  pull_request:
    paths:
      - 'src/**'
      - 'specs/**'
      - 'scripts/**'
      - 'android/**'
      - 'ios/**'
      - '.github/workflows/debug-emulator.yml'
      - 'metro.config.js'
      - 'babel.config.js'
      - 'index.js'
      - 'package.json'
  push:
    branches:
      - main
      - master
      - 'mission/**'
    # Same path filter as `pull_request:` — keep these in sync. The
    # original trigger (src/**, specs/**, a handful of JS config files)
    # missed three categories of changes that the suite is SUPPOSED
    # to guard:
    #   - The workflow file itself — updating the runner pins or the
    #     artifact-upload glob without re-running the suite hides
    #     breakages until the next unrelated src change.
    #   - `scripts/emulator-debug-flow.py` / `scripts/**` — the driver
    #     logic IS the suite. A regression in the driver (missing a
    #     sensitive-screen placeholder, a bad adb invocation, an
    #     assertion typo) would never run until a src change landed.
    #   - `android/**` / `ios/**` — the native vault implementations
    #     and `MainActivity.onCreate`'s FLAG_SECURE baseline live here;
    #     a regression in either is EXACTLY what the emulator run
    #     catches.
    paths:
      - 'src/**'
      - 'specs/**'
      - 'scripts/**'
      - 'android/**'
      - 'ios/**'
      - '.github/workflows/debug-emulator.yml'
      - 'metro.config.js'
      - 'babel.config.js'
      - 'index.js'
      - 'package.json'

# Cancel an in-flight run for the same ref (PR head or branch) when a
# new push lands so we don't burn an emulator slot validating a stale
# commit. `cancel-in-progress: true` is safe for `pull_request` (each
# new push supersedes the prior validation result) and for `push` to
# long-lived branches (only the head matters for the green-build
# signal).
concurrency:
  group: debug-emulator-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debug-android:
    runs-on: ubuntu-latest
    # timeout-minutes must be >= 45 (emulator boot ~5 min, release APK build ~15 min,
    # biometric-first flow + relaunch cycle ~10 min + margin). See VAL-CI-016.
    timeout-minutes: 60

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk /opt/ghc /usr/local/share/boost
          sudo apt-get -qq purge -y 'dotnet-*' 'aspnetcore-*' 'firefox' 'google-chrome-stable' || true
          sudo apt-get -qq autoremove -y || true
          sudo apt-get -qq clean || true
          df -h /

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - run: bun install --frozen-lockfile

      - name: Build release APK (JS pre-bundled, no dev server needed)
        run: ./gradlew assembleRelease --no-daemon -x lint
        working-directory: android

      # STEP 1 — run the biometric onboarding flow on the emulator.
      # The runner script captures the Python driver's exit code into
      # ``$GITHUB_ENV`` as ``SCRIPT_EXIT_CODE`` and ALWAYS exits 0 so
      # that the subsequent ``if: always()`` steps (artifact sanity
      # check, upload, exit-code propagation) run in a well-defined
      # order. Job failure when the driver regresses is asserted by
      # the exit-code propagation step below (Option A — workflow-level
      # always-run capture, VAL-CI-013 / VAL-CI-024).
      - name: Run on emulator and capture logs
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          # `google_apis` system image includes the fingerprint HAL required by the
          # biometric-first onboarding flow; the default `default`/`aosp_atd` images
          # lack it and would silently let the flow pass. See VAL-CI-036.
          target: google_apis
          arch: x86_64
          profile: pixel_5
          # Reset AVD state between reruns so stale fingerprint/credential state
          # from a prior run cannot satisfy the current flow. See VAL-CI-031.
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          # IMPORTANT: keep this `script:` block a one-liner.
          # `reactivecircus/android-emulator-runner@v2` runs each line of
          # this field as a separate `sh -c` invocation (see its
          # `parseScript` helper and issue #391), which makes multi-line
          # bash functions / `trap` handlers impossible here. All the
          # actual orchestration (install APK, launch app, capture
          # logcat, run the Python flow, always-run cleanup) lives in
          # `scripts/ci-debug-emulator-runner.sh` so the logic survives.
          # Do not inline the script body back into this block.
          script: bash scripts/ci-debug-emulator-runner.sh

      # STEP 2 — verify the capture phase produced the artifacts the
      # upload step expects. Runs unconditionally so failed runs still
      # surface missing-artifact diagnostics in the workflow log. If
      # any required artifact is missing, a placeholder file is
      # written so ``actions/upload-artifact`` has something to upload
      # (rather than silently skipping when all paths resolve to
      # nothing — see VAL-CI-032).
      - name: Verify captured artifacts
        if: always()
        shell: bash
        run: |
          set +e
          echo "=== [verify] Listing captured artifacts ==="
          ls -la /tmp/logcat-full.txt /tmp/logcat-rn.txt /tmp/logcat-startup.txt 2>/dev/null \
            || echo "warning: one or more logcat files are missing"
          ls -la /tmp/emulator-ui-artifacts 2>/dev/null \
            || echo "warning: /tmp/emulator-ui-artifacts directory is missing"

          mkdir -p /tmp/emulator-ui-artifacts
          for f in /tmp/logcat-full.txt /tmp/logcat-rn.txt /tmp/logcat-startup.txt; do
            if [ ! -f "$f" ]; then
              echo "=== [verify] creating placeholder for missing $f ===" >&2
              echo "MISSING — emulator step aborted before capture phase could write this file." > "$f"
            fi
          done

      # STEP 3 — upload whatever artifacts exist, even on failure.
      # ``if: always()`` guarantees the upload runs when STEP 1 or
      # STEP 2 report failure (VAL-CI-013 / VAL-CI-030).
      - name: Upload logs and screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Deterministic artifact name keyed on the commit SHA so a parent
          # validation step can locate it by SHA. See VAL-CI-030.
          name: emulator-debug-${{ github.sha }}
          path: |
            /tmp/logcat-full.txt
            /tmp/logcat-rn.txt
            /tmp/logcat-startup.txt
            /tmp/emulator-ui-artifacts/**
          # retention-days must be >= 7 per VAL-CI-030.
          retention-days: 7

      # STEP 4 — re-exit with the Python driver's exit code so the job
      # fails loudly whenever the onboarding flow regressed. STEP 1
      # deliberately exits 0 to let the ``if: always()`` sanity-check
      # and upload steps run; this step is the sole source of job
      # failure signal for driver regressions. ``if: always()`` so it
      # also runs when STEPS 2 or 3 reported a problem (VAL-CI-024).
      - name: Propagate emulator flow exit code
        if: always()
        shell: bash
        run: |
          CODE="${SCRIPT_EXIT_CODE:-}"
          if [ -z "$CODE" ]; then
            echo "::error::SCRIPT_EXIT_CODE was not exported — the emulator step likely aborted before the Python driver ran."
            exit 1
          fi
          echo "=== Emulator flow script exit code: ${CODE} ==="
          if [ "$CODE" != "0" ]; then
            echo "::error::Emulator onboarding flow failed (python3 scripts/emulator-debug-flow.py exited ${CODE}). Check the uploaded artifact 'emulator-debug-${{ github.sha }}' for logs and screenshots."
            exit "$CODE"
          fi
          echo "=== Emulator onboarding flow completed successfully ==="
