name: Debug on Emulator

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'specs/**'
      - 'metro.config.js'
      - 'babel.config.js'
      - 'index.js'
      - 'package.json'

jobs:
  debug-android:
    runs-on: ubuntu-latest
    # timeout-minutes must be >= 45 (emulator boot ~5 min, release APK build ~15 min,
    # biometric-first flow + relaunch cycle ~10 min + margin). See VAL-CI-016.
    timeout-minutes: 60

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk /opt/ghc /usr/local/share/boost
          sudo apt-get -qq purge -y 'dotnet-*' 'aspnetcore-*' 'firefox' 'google-chrome-stable' || true
          sudo apt-get -qq autoremove -y || true
          sudo apt-get -qq clean || true
          df -h /

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - run: bun install --frozen-lockfile

      - name: Build release APK (JS pre-bundled, no dev server needed)
        run: ./gradlew assembleRelease --no-daemon -x lint
        working-directory: android

      - name: Run on emulator and capture logs
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          # `google_apis` system image includes the fingerprint HAL required by the
          # biometric-first onboarding flow; the default `default`/`aosp_atd` images
          # lack it and would silently let the flow pass. See VAL-CI-036.
          target: google_apis
          arch: x86_64
          profile: pixel_5
          # Reset AVD state between reruns so stale fingerprint/credential state
          # from a prior run cannot satisfy the current flow. See VAL-CI-031.
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            set -e

            # Ensure artifact directories exist before we capture anything.
            mkdir -p /tmp/emulator-ui /tmp/emulator-ui-artifacts

            # Always-run cleanup: copy UI artifacts + dump logcats regardless
            # of whether the python flow script succeeded. The EXIT trap fires
            # on normal shell exit AND on `set -e`-induced failure exit, which
            # means `logcat-full.txt`, `logcat-rn.txt`, `flow-error.png`, and
            # any partial screenshots are always uploaded. The shell still
            # propagates the original (failing) exit code, so VAL-CI-013 /
            # VAL-CI-024 (job fails loudly on flow regression) remain honored.
            capture_artifacts() {
              set +e
              echo ""
              echo "=== [cleanup] Copying screenshots and dumps into the artifact tree ==="
              cp -R /tmp/emulator-ui/. /tmp/emulator-ui-artifacts/ 2>/dev/null

              echo ""
              echo "========================================="
              echo "=== ReactNativeJS + Crash Logs ==="
              echo "========================================="
              adb logcat -d -s ReactNativeJS:V ReactNative:V AndroidRuntime:E 2>&1

              echo ""
              echo "========================================="
              echo "=== All ERROR level logs ==="
              echo "========================================="
              adb logcat -d '*:E' 2>&1 | grep -i "react\|enbox\|level\|crypto\|fatal\|exception"

              echo ""
              echo "=== [cleanup] Saving full logcat (size-bounded to 10 MiB) ==="
              # Cap each logcat artifact at 10 MiB so uploads stay well under
              # GitHub's per-artifact limit. See VAL-CI-032.
              adb logcat -d 2>&1 | head -c 10485760 > /tmp/logcat-full.txt
              adb logcat -d -s ReactNativeJS:V ReactNative:V AndroidRuntime:E 2>&1 | head -c 10485760 > /tmp/logcat-rn.txt
            }
            trap capture_artifacts EXIT

            echo "=== Installing release APK ==="
            adb install android/app/build/outputs/apk/release/app-release.apk

            echo "=== Clearing logcat ==="
            adb logcat -c

            echo "=== Launching app ==="
            adb shell am start -n org.enbox.mobile/.MainActivity

            echo "=== Waiting for app to start (20s) ==="
            sleep 20

            echo "=== Capturing initial logcat (size-bounded to 10 MiB) ==="
            adb logcat -d 2>&1 | head -c 10485760 > /tmp/logcat-startup.txt

            echo "=== Driving onboarding flow by UI text ==="
            # No `|| true` — the script's exit code must propagate so flow regressions
            # fail the job. See VAL-CI-013 / VAL-CI-024.
            python3 scripts/emulator-debug-flow.py

      - name: Upload logs and screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Deterministic artifact name keyed on the commit SHA so a parent
          # validation step can locate it by SHA. See VAL-CI-030.
          name: emulator-debug-${{ github.sha }}
          path: |
            /tmp/logcat-full.txt
            /tmp/logcat-rn.txt
            /tmp/logcat-startup.txt
            /tmp/emulator-ui-artifacts/**
          # retention-days must be >= 7 per VAL-CI-030.
          retention-days: 7
