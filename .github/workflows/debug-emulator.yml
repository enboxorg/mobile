name: Debug on Emulator

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'specs/**'
      - 'metro.config.js'
      - 'babel.config.js'
      - 'index.js'
      - 'package.json'

jobs:
  debug-android:
    runs-on: ubuntu-latest
    # timeout-minutes must be >= 45 (emulator boot ~5 min, release APK build ~15 min,
    # biometric-first flow + relaunch cycle ~10 min + margin). See VAL-CI-016.
    timeout-minutes: 60

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk /opt/ghc /usr/local/share/boost
          sudo apt-get -qq purge -y 'dotnet-*' 'aspnetcore-*' 'firefox' 'google-chrome-stable' || true
          sudo apt-get -qq autoremove -y || true
          sudo apt-get -qq clean || true
          df -h /

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - run: bun install --frozen-lockfile

      - name: Build release APK (JS pre-bundled, no dev server needed)
        run: ./gradlew assembleRelease --no-daemon -x lint
        working-directory: android

      - name: Run on emulator and capture logs
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          # `google_apis` system image includes the fingerprint HAL required by the
          # biometric-first onboarding flow; the default `default`/`aosp_atd` images
          # lack it and would silently let the flow pass. See VAL-CI-036.
          target: google_apis
          arch: x86_64
          profile: pixel_5
          # Reset AVD state between reruns so stale fingerprint/credential state
          # from a prior run cannot satisfy the current flow. See VAL-CI-031.
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          # IMPORTANT: keep this `script:` block a one-liner.
          # `reactivecircus/android-emulator-runner@v2` runs each line of
          # this field as a separate `sh -c` invocation (see its
          # `parseScript` helper and issue #391), which makes multi-line
          # bash functions / `trap` handlers impossible here. All the
          # actual orchestration (install APK, launch app, capture
          # logcat, run the Python flow, always-run cleanup) lives in
          # `scripts/ci-debug-emulator-runner.sh` so the trap + function
          # bodies survive. Do not inline the script body back into this
          # block.
          script: bash scripts/ci-debug-emulator-runner.sh

      - name: Upload logs and screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Deterministic artifact name keyed on the commit SHA so a parent
          # validation step can locate it by SHA. See VAL-CI-030.
          name: emulator-debug-${{ github.sha }}
          path: |
            /tmp/logcat-full.txt
            /tmp/logcat-rn.txt
            /tmp/logcat-startup.txt
            /tmp/emulator-ui-artifacts/**
          # retention-days must be >= 7 per VAL-CI-030.
          retention-days: 7
